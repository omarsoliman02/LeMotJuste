server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          # URIs surchargées par variables d'environnement en Docker (docker-compose).
          routes:
            - id: player-service
              uri: ${PLAYER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/players/**
            - id: game-service
              uri: ${GAME_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/games/**
            - id: score-service
              uri: ${SCORE_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/api/scores/**
            # Documentation OpenAPI : la gateway relaie le /v3/api-docs de chaque service
            # pour alimenter la Swagger UI agrégée (voir le bloc springdoc plus bas).
            - id: player-service-docs
              uri: ${PLAYER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/player-service/v3/api-docs
              filters:
                - RewritePath=/player-service/v3/api-docs, /v3/api-docs
            - id: game-service-docs
              uri: ${GAME_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/game-service/v3/api-docs
              filters:
                - RewritePath=/game-service/v3/api-docs, /v3/api-docs
            - id: score-service-docs
              uri: ${SCORE_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/score-service/v3/api-docs
              filters:
                - RewritePath=/score-service/v3/api-docs, /v3/api-docs
          # En-têtes de sécurité ajoutés à TOUTES les réponses passant par la gateway
          # (défense en profondeur ; les en-têtes de la page HTML sont posés par Caddy).
          default-filters:
            - AddResponseHeader=X-Content-Type-Options, nosniff
            - AddResponseHeader=X-Frame-Options, DENY
            - AddResponseHeader=Referrer-Policy, no-referrer
            - AddResponseHeader=Cache-Control, no-store
          # CORS restreint aux origines connues (au lieu de « * »). En prod la page et
          # l'API sont sur le même domaine (Caddy) : le CORS ne sert qu'au dev local.
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - "https://lemotjuste.duckdns.org"
                  - "http://localhost:5500"
                  - "http://localhost:5599"
                allowed-methods:
                  - GET
                  - POST
                  - OPTIONS
                allowed-headers:
                  - Content-Type
                  - X-Admin-Token
                allow-credentials: false
                max-age: 3600

# Swagger UI agrégée servie par la gateway : http://localhost:8080/swagger-ui.html
# Le menu déroulant « Select a definition » liste les 3 microservices, chacun servi
# via son /v3/api-docs relayé ci-dessus.
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: player-service
        url: /player-service/v3/api-docs
      - name: game-service
        url: /game-service/v3/api-docs
      - name: score-service
        url: /score-service/v3/api-docs
