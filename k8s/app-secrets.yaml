# Jetons d'API partagés (prod). À CHANGER pour de vraies valeurs aléatoires et à ne pas
# versionner en clair dans un vrai déploiement (utiliser un gestionnaire de secrets).
#   - INTERNAL_API_TOKEN : partagé entre game-service et score-service pour autoriser
#     l'enregistrement d'un score (bloque l'injection de faux scores depuis l'extérieur).
#   - ADMIN_API_TOKEN : requis par les listes globales (vue admin). C'est le mot de passe
#     que l'administrateur saisit dans l'interface.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  INTERNAL_API_TOKEN: "CHANGER-jeton-interne-aleatoire"
  ADMIN_API_TOKEN: "CHANGER-mot-de-passe-admin-fort"
