apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: lemotjuste-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          # PLAYER/GAME/SCORE_SERVICE_URI (routage) viennent de la ConfigMap app-config.
          envFrom:
            - configMapRef:
                name: app-config
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
# Point d'entrée unique exposé hors du cluster (NodePort fixe pour la démo).
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
