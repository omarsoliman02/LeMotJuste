apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-service
  labels:
    app: game-service
spec:
  replicas: 2
  # Montée de version sans coupure : on ne retire jamais un pod avant que son
  # remplaçant soit prêt (readinessProbe).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: game-service
  template:
    metadata:
      labels:
        app: game-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo 'attente de postgres'; sleep 2; done"]
      containers:
        - name: game-service
          image: lemotjuste-game-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/motus_games
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: INTERNAL_API_TOKEN
            - name: ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_API_TOKEN
          # PLAYER_SERVICE_URL / SCORE_SERVICE_URL (Feign) viennent de la ConfigMap app-config.
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: game-service
  labels:
    app: game-service
spec:
  selector:
    app: game-service
  ports:
    - port: 8082
      targetPort: 8082
