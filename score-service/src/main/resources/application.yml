server:
  port: 8083

spring:
  application:
    name: score-service
  # Valeurs par défaut pour le développement local (hors Docker).
  # En conteneur, surchargées par les variables SPRING_DATASOURCE_* (docker-compose).
  datasource:
    url: jdbc:postgresql://localhost:5432/motus_scores
    username: motus
    password: motus
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

# Jetons d'API (valeurs de dev, à surcharger par variables d'environnement en prod).
# internal : partagé avec game-service pour autoriser l'enregistrement d'un score.
# admin    : requis pour lister l'historique complet (vue admin).
internal:
  api-token: ${INTERNAL_API_TOKEN:lemotjuste-internal-token}
admin:
  api-token: ${ADMIN_API_TOKEN:motus-admin}
