server:
  port: 8081

spring:
  application:
    name: player-service
  # Valeurs par défaut pour le développement local (hors Docker).
  # En conteneur, surchargées par les variables SPRING_DATASOURCE_* (docker-compose).
  datasource:
    url: jdbc:postgresql://localhost:5432/motus_players
    username: motus
    password: motus
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

# Secret du jeton de session joueur (HMAC). DOIT être identique côté game-service, qui
# vérifie le jeton pour interdire de démarrer une partie à la place d'un autre.
# Valeur de dev par défaut, à surcharger par variable d'environnement en prod.
player:
  token-secret: ${PLAYER_TOKEN_SECRET:lemotjuste-player-token-secret}
