# Le Mot Juste — orchestration locale.
# PostgreSQL (3 bases) + player-service + game-service + score-service + gateway.

services:
  postgres:
    image: postgres:17-alpine
    container_name: lemotjuste-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: motus
      POSTGRES_PASSWORD: motus
      POSTGRES_DB: motus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motus"]
      interval: 5s
      timeout: 5s
      retries: 10

  player-service:
    build: ./player-service
    container_name: lemotjuste-player
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/motus_players
      SPRING_DATASOURCE_USERNAME: motus
      SPRING_DATASOURCE_PASSWORD: motus
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  game-service:
    build: ./game-service
    container_name: lemotjuste-game
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/motus_games
      SPRING_DATASOURCE_USERNAME: motus
      SPRING_DATASOURCE_PASSWORD: motus
      PLAYER_SERVICE_URL: http://player-service:8081
      SCORE_SERVICE_URL: http://score-service:8083
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      player-service:
        condition: service_started

  score-service:
    build: ./score-service
    container_name: lemotjuste-score
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/motus_scores
      SPRING_DATASOURCE_USERNAME: motus
      SPRING_DATASOURCE_PASSWORD: motus
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build: ./gateway
    container_name: lemotjuste-gateway
    restart: unless-stopped
    environment:
      PLAYER_SERVICE_URI: http://player-service:8081
      GAME_SERVICE_URI: http://game-service:8082
      SCORE_SERVICE_URI: http://score-service:8083
    ports:
      - "8080:8080"
    depends_on:
      - player-service
      - game-service
      - score-service

volumes:
  postgres-data:
