server:
  port: 8082

spring:
  application:
    name: game-service
  # Valeurs par défaut pour le développement local (hors Docker).
  # En conteneur, surchargées par les variables SPRING_DATASOURCE_* (docker-compose).
  datasource:
    url: jdbc:postgresql://localhost:5432/motus_games
    username: motus
    password: motus
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

# URLs des services appelés en Feign (surchargées par variables d'environnement en Docker).
player-service:
  url: ${PLAYER_SERVICE_URL:http://localhost:8081}
score-service:
  url: ${SCORE_SERVICE_URL:http://localhost:8083}

# Jetons d'API (valeurs de dev, surchargées par variables d'environnement en prod).
# internal : ajouté aux appels Feign (score-service l'exige pour enregistrer un score).
# admin    : requis pour lister toutes les parties (vue admin).
internal:
  api-token: ${INTERNAL_API_TOKEN:lemotjuste-internal-token}
admin:
  api-token: ${ADMIN_API_TOKEN:motus-admin}

# Secret du jeton de session joueur (HMAC). DOIT être identique côté player-service (qui
# émet le jeton) pour vérifier qu'on ne démarre pas une partie à la place d'un autre.
player:
  token-secret: ${PLAYER_TOKEN_SECRET:lemotjuste-player-token-secret}

# Paramètres du jeu Motus.
game:
  max-attempts: 6
  # Indices par partie (chacun coûte des points, barème dans score-service).
  max-hints: 2
  # Temps limite d'une partie ranked (secondes) : dépassé => défaite. Sert aussi de référence
  # au bonus de vitesse (doit rester aligné avec RANKED_REF_SECONDS dans score-service).
  ranked-time-limit-seconds: 150
  dictionary-path: dictionnaire.txt
  accepted-words-path: mots-valides.txt
  min-word-length: 4
  max-word-length: 10
